<!-- Animated Background (only render when loading complete) -->
<app-animated-background *ngIf="!isLoading"></app-animated-background>

<!-- Loader -->
<div *ngIf="showLoader" [ngClass]="{'fade-out': !isLoading}" class="loader-wrapper">
  <div class="loader-container">
    <div class="loader-content">Loading Portfolio</div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar" [style.width.%]="loadingProgress"></div>
    </div>
    <div class="progress-text">{{ loadingProgress | number:'0.0-0' }}%</div>
  </div>
</div>

<div *ngIf="!isLoading" [ngClass]="{'fade-in': !isLoading}" class="portfolio-content">
  <app-page-container>
    <app-hero></app-hero>
    <app-about></app-about>
    <app-skills></app-skills>
    <app-projects></app-projects>
    <app-architecture></app-architecture>
    <app-ai></app-ai>
    <app-contact></app-contact>
  </app-page-container>
</div>
