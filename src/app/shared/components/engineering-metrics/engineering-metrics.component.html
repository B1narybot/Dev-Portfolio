<div class="engineering-metrics-container data-layer-reveal">
  <div class="metrics-header">
    <h2>Development Metrics</h2>
    <p>Project portfolio overview and technical expertise</p>
  </div>

  <div class="metrics-content">
    <!-- Canvas for Charts -->
    <div class="charts-section">
      <canvas #metricsCanvas class="metrics-canvas"></canvas>
    </div>

    <!-- Summary Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value">{{ projectMetrics.totalProjects }}</div>
        <div class="stat-label">Projects Built</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">🛠️</div>
        <div class="stat-value">{{ projectMetrics.totalTechnologies }}</div>
        <div class="stat-label">Technologies</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">⚙️</div>
        <div class="stat-value">{{ projectMetrics.avgComplexity.toFixed(1) }}</div>
        <div class="stat-label">Avg Complexity</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">{{ projectMetrics.avgImpact.toFixed(1) }}</div>
        <div class="stat-label">Avg Impact</div>
      </div>
    </div>


  </div>
</div>
