[build]
  command = "ng build"
  publish = "dist/angular-quickstart"

[build.environment]
  NODE_VERSION = "20.19.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  included_files = [
    "netlify/functions/Templates/adminTemp.html",
    "netlify/functions/Templates/userTemp.html"
  ]
